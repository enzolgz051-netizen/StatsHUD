name: Build StatsHUD Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.26'

      - name: Download BakkesModSDK
        run: git clone https://github.com/bakkesmodorg/BakkesModSDK.git C:/BakkesModSDK

      - name: Configure CMake
        run: cmake -S . -B build -DBAKKESMOD_SDK_PATH="C:/BakkesModSDK" -A x64 -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE="${{github.workspace}}/output"

      - name: Build
        run: cmake --build build --config Release

      - name: Find DLL location
        shell: powershell
        run: Get-ChildItem -Path . -Recurse -Filter *.dll | Select-Object FullName

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: StatsHUD-plugin
          path: output/StatsHUD.dll
          if-no-files-found: error
